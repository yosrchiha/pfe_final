stages:
  - install
  - analyze
  - test
  - quality_gate

# --- INSTALLATION ---
install-backend:
  stage: install
  image: python:3.11
  script:
    - pip install -r backend/requirements.txt
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

install-frontend:
  stage: install
  image: node:18
  script:
    - cd frontend
    - npm install
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID
  # Ajout d'une tentative de relance en cas d'échec temporaire
  retry: 1

# --- ANALYSE ---
llm-audit:
  stage: analyze
  image: python:3.11
  needs: ["install-backend"]
  script:
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
    - python backend/run_audit.py
  artifacts:
    paths:
      - audit_report.json
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH

security-scan:
  stage: analyze
  image: python:3.11
  needs: ["install-backend"]
  script:
    - pip install bandit
    - bandit -r backend/app -x backend/tests
  # Permet au job d'échouer sans bloquer le pipeline entier
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH

# --- TESTS ---
unit-tests-backend:
  stage: test
  image: python:3.11
  needs: ["install-backend"]
  script:
    - pip install pytest pytest-cov
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
    - pytest --cov=backend/app backend/tests/
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

unit-tests-frontend:
  stage: test
  image: node:18
  needs: ["install-frontend"]
  script:
    - cd frontend
    - |
      if grep -q "test" package.json; then
        npm test
      else
        echo "Aucun script de test trouvé dans package.json, exécution du build pour vérification"
        npm run build
      fi
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

# --- QUALITÉ ---
quality-gate:
  stage: quality_gate
  image: python:3.11
  needs: ["llm-audit"]
  script:
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
    - python backend/check_quality_gate.py
  rules:
    - if: $CI_MERGE_REQUEST_IID