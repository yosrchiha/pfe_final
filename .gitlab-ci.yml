stages:
  - install
  - analyze
  - test
  - quality_gate

# --- INSTALLATION ---
install-backend:
  stage: install
  image: python:3.11
  script:
    - pip install -r backend/requirements.txt
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

install-frontend:
  stage: install
  image: node:18
  script:
    - cd frontend
    - npm install
  cache:
    key: frontend-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules/
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

# --- ANALYSE ---
llm-audit:
  stage: analyze
  image: python:3.11
  needs: ["install-backend"]
  script:
    - python backend/run_audit.py
  artifacts:
    paths:
      - audit_report.json
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

security-scan:
  stage: analyze
  image: python:3.11
  needs: ["install-backend"]
  script:
    - pip install bandit
    - bandit -r backend/app -ll || true
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

# --- TESTS ---
unit-tests-backend:
  stage: test
  image: python:3.11
  needs: ["install-backend"]
  script:
    - pip install pytest pytest-cov
    - pytest --cov=backend/app backend/tests/
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

unit-tests-frontend:
  stage: test
  image: node:18
  needs: ["install-frontend"]
  cache:
    key: frontend-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules/
    policy: pull
  script:
    - cd frontend
    - npm test
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

# --- QUALITÉ ---
quality-gate:
  stage: quality_gate
  image: python:3.11
  needs: ["llm-audit"]
  script:
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
    - python backend/check_quality_gate.py
  rules:
    - if: $CI_MERGE_REQUEST_IID