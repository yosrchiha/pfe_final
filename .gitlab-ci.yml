stages:
  - install
  - analyze
  - test
  - quality_gate

# --- INSTALLATION ---
install-backend:
  stage: install
  image: python:3.11  # Version plus récente et stable
  script:
    - pip install -r backend/requirements.txt
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

install-frontend:
  stage: install
  image: node:18
  script:
    - cd frontend
    - npm install
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

# --- ANALYSE ---
llm-audit:
  stage: analyze
  image: python:3.11
  needs: ["install-backend"]
  script:
    - python backend/run_audit.py
  artifacts:
    paths:
      - audit_report.json
  rules:
    - if: $CI_COMMIT_BRANCH

security-scan:
  stage: analyze
  image: python:3.11
  needs: ["install-backend"]
  script:
    - pip install bandit
    - bandit -r backend/app
  rules:
    - if: $CI_COMMIT_BRANCH

# --- TESTS ---
unit-tests-backend:
  stage: test
  image: python:3.11
  needs: ["install-backend"]
  script:
    - pip install pytest pytest-cov
    - pytest --cov=backend/app backend/tests/
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

unit-tests-frontend:
  stage: test
  image: node:18
  needs: ["install-frontend"]
  script:
    - cd frontend
    - npm test || echo "Aucun test frontend trouvé"
  allow_failure: true  # Empêche ce job de bloquer tout le pipeline
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_IID

# --- QUALITÉ ---
quality-gate:
  stage: quality_gate
  image: python:3.11
  needs: ["llm-audit"]
  script:
    - python backend/check_quality_gate.py
  rules:
    - if: $CI_MERGE_REQUEST_IID
